<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Квиз | Банк России</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Roboto", Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 860px;
      width: 100%;
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .header { background: #003b6f; padding: 24px 28px; color: #fff; }
    .header h1 { font-weight: 500; font-size: 1.8rem; }
    .header p { opacity: 0.88; margin-top: 8px; }

    .content { padding: 32px 28px; }

    .settings-group { margin-bottom: 28px; }
    .settings-label {
      font-weight: 600;
      color: #003b6f;
      margin-bottom: 12px;
      border-left: 4px solid #003b6f;
      padding-left: 12px;
    }

    .radio-group, .select-group {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 8px;
    }

    .radio-group label, .select-group select {
      background: #f8fafc;
      padding: 10px 18px;
      border-radius: 48px;
      font-weight: 500;
      border: 1px solid #cfdee9;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      font-size: 1rem;
    }

    .select-group select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23003B6F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 18px center;
      padding-right: 42px;
    }

    .radio-group label:hover, .select-group select:hover { background: #e6edf4; }

    .btn {
      background: #003b6f;
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 48px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: 0.2s;
    }
    .btn:hover { background: #002a50; transform: translateY(-1px); }
    .btn-secondary { background: #eef2f7; color: #003b6f; border: 1px solid #cbdde9; }
    .btn-secondary:hover { background: #e2e8f0; }

    .error-message {
      background: #ffe6e5;
      color: #b00020;
      padding: 12px;
      border-radius: 20px;
      margin-top: 18px;
      text-align: center;
      display: none;
    }
    .success-message {
      background: #e0f7e8;
      color: #0b5e2e;
      padding: 12px;
      border-radius: 20px;
      margin-top: 18px;
      text-align: center;
      display: none;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      border-bottom: 1px solid #e2edf2;
      padding-bottom: 12px;
    }
    .question-counter {
      background: #eef3fc;
      padding: 0 14px;
      border-radius: 40px;
      color: #003b6f;
      font-weight: 600;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .timer {
      font-size: 2rem;
      font-weight: 700;
      font-family: monospace;
      background: #f0f4fa;
      padding: 6px 18px;
      border-radius: 60px;
    }
    .timer.warning { color: #dc2626; background: #ffe8e8; }

    .question-text {
      font-size: 1.35rem;
      font-weight: 500;
      margin: 20px 0 24px;
      color: #0a2a44;
      line-height: 1.4;
    }
    .option-item {
      margin-bottom: 14px;
      background: #f9fbfd;
      padding: 12px 18px;
      border-radius: 24px;
      border: 1px solid #e2edf2;
    }
    .option-item label { margin-left: 10px; cursor: pointer; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: 48px;
      border: 1px solid #cfdee9;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #8ab0d1; }

    .feedback {
      margin: 18px 0 20px;
      padding: 14px 18px;
      border-radius: 20px;
      font-weight: 500;
      background: #f2f6f9;
      line-height: 1.45;
    }
    .feedback.correct { background: #e0f7e8; color: #0b5e2e; border-left: 6px solid #2b8c4a; }
    .feedback.wrong { background: #ffeceb; color: #b91c1c; border-left: 6px solid #dc2626; }

    .result-stats {
      background: #f2f6fc;
      padding: 20px;
      border-radius: 32px;
      text-align: center;
      margin: 20px 0;
    }
    .stat-number { font-size: 2.5rem; font-weight: 700; color: #003b6f; }

    .auth-card {
      background: #f8fafc;
      border: 1px solid #e2edf2;
      border-radius: 26px;
      padding: 20px;
      margin-top: 8px;
    }
    .auth-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .auth-actions .btn { margin-top: 0; }
    .muted {
      color: #51657a;
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .history-card {
      background: #f9fbfd;
      border: 1px solid #dce8f2;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    @media (max-width: 650px) {
      .question-text { font-size: 1.15rem; }
      .timer { font-size: 1.45rem; }
      .question-counter { height: 36px; font-size: 0.9rem; }
      .auth-actions { flex-direction: column; }
    }
   
    #quizScreen, #quizScreen * {
  caret-color: transparent;
}
#quizScreen #openInput {
  caret-color: auto; /* вернуть каретку только в поле ответа */
}

    
    #startScreen, #startScreen *,
#quizScreen, #quizScreen *,
#resultsScreen, #resultsScreen *,
#historyScreen, #historyScreen * {
  caret-color: transparent;
}
#authScreen input,
#quizScreen #openInput {
  caret-color: auto;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Банк России</h1>
      <p>Экономический дуолинго</p>
    </div>

    <div class="content">
      <div id="authScreen">
        <h3>Вход в систему</h3>
        <p class="muted">Войдите или зарегистрируйтесь.</p>

        <div class="auth-card">
          <input type="text" id="authLogin" placeholder="Логин" autocomplete="off" />
          <input type="password" id="authPassword" placeholder="Пароль" style="margin-top:10px;" />
          <div class="auth-actions">
            <button class="btn" id="loginBtn">Войти</button>
            <button class="btn btn-secondary" id="registerBtn">Регистрация</button>
          </div>
          <div id="authErrorMsg" class="error-message"></div>
          <div id="authSuccessMsg" class="success-message"></div>
        </div>
      </div>

      <div id="startScreen" style="display:none;">
        <div class="settings-group">
          <div class="settings-label">Тема</div>
          <div class="radio-group">
            <label><input type="radio" name="theme" value="Операционные процедуры Банка России" /> Операционные процедуры</label>
            <label><input type="radio" name="theme" value="Макропруденциальная политика Банка России" checked /> Макропруденциальная политика</label>
            <label><input type="radio" name="theme" value="mix" /> Микс тем</label>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-label">Уровень сложности</div>
          <div class="radio-group">
            <label><input type="radio" name="difficulty" value="базовый" checked /> Базовый</label>
            <label><input type="radio" name="difficulty" value="продвинутый" /> Продвинутый</label>
            <label><input type="radio" name="difficulty" value="сложный" /> Сложный</label>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-label">Количество вопросов</div>
          <div class="select-group">
            <select id="questionCountSelect">
              <option value="5">5 вопросов</option>
              <option value="10" selected>10 вопросов</option>
              <option value="15">15 вопросов</option>
            </select>
          </div>
        </div>

        <button class="btn" id="startQuizBtn">▶ Начать квиз</button>
        <button class="btn btn-secondary" id="historyStartBtn" style="margin-top:10px;">История результатов</button>
        <div id="startErrorMsg" class="error-message"></div>
      </div>

      <div id="quizScreen" style="display:none;">
        <div class="quiz-header">
          <span class="question-counter" id="questionCounter">Вопрос 1 / 10</span>
          <span class="timer" id="timerDisplay">01:00</span>
        </div>
        <div class="question-text" id="questionText"></div>
        <div id="optionsContainer"></div>
        <div id="feedbackBlock" class="feedback" style="display:none;"></div>
        <button class="btn" id="submitAnswerBtn">Ответить</button>
        <button class="btn btn-secondary" id="nextQuestionBtn" style="display:none;">➡ Перейти к следующему</button>
      </div>

      <div id="resultsScreen" style="display:none;">
        <h3>Результаты квиза</h3>
        <div class="result-stats">
          <div><span class="stat-number" id="correctCount">0</span> / <span id="totalQuestionsStat">0</span></div>
          <div>Процент верных: <strong id="percentageStat">0%</strong></div>
          <div>⏱ Общее время: <strong id="totalTimeSec">0</strong> секунд</div>
          <div style="margin-top:8px;">Пользователь: <strong id="resultUserName">—</strong></div>
        </div>

        <div id="resultSaveError" class="error-message"></div>

        <button class="btn" id="restartQuizBtn">Пройти ещё раз</button>
        <button class="btn btn-secondary" id="historyBtn" style="margin-top:10px;">История результатов</button>
      </div>

      <div id="historyScreen" style="display:none;">
        <h3>История результатов</h3>
        <div id="historyList" style="margin-top:14px;"></div>
        <button class="btn btn-secondary" id="backToResultsBtn">⬅ Назад</button>
      </div>
    </div>
  </div>

  <script>

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztAItRasMNLPlHsIRKdh9e8ojylnh3-Zhke5mWri61opSKF7IXMqiY0JhWmJYIk_yI1A/exec";

    let currentQuizQuestions = [];
    let userAnswersRecord = [];
    let quizStartTimestamp = null;
    let currentQuestionIndex = 0;
    let timerInterval = null;
    let timeLeft = 60;
    let answerLock = false;
    let currentQuestionObj = null;
    let autoTransitionTimeout = null;
    let currentUser = null;
    let savingInProgress = false;
    let historyFrom = "results";

    let authScreen, startScreen, quizScreen, resultsScreen, historyScreen;
    let authLogin, authPassword, loginBtn, registerBtn, authErrorMsg, authSuccessMsg;
    let startErrorMsg, startBtn, submitBtn, nextBtn, restartBtn, historyBtn, historyStartBtn, backToResultsBtn;
    let questionCounterSpan, timerDisplay, questionTextDiv, optionsContainer, feedbackBlock;
    let correctCountSpan, totalQuestionsStatSpan, percentageStatSpan, totalTimeSecSpan, resultUserName;
    let resultSaveError, historyList;

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeAnswer(str) {
      return String(str || "")
        .trim()
        .toLowerCase()
        .replace(/ё/g, "е")
        .replace(/\s+/g, " ");
    }

    function formatHistoryDate(value) {
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value || "");
      return d.toLocaleString("ru-RU", {
        day: "2-digit",
        month: "long",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showError(el, msg) { el.textContent = msg; el.style.display = "block"; }
    function showSuccess(el, msg) { el.textContent = msg; el.style.display = "block"; }
    function hideMsg(el) { el.style.display = "none"; el.textContent = ""; }

    async function callAppsScript(action, data) {
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=${encodeURIComponent(action)}`, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(data || {})
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const raw = await response.text();
        try { return JSON.parse(raw); } catch (_) { return { success: true, raw }; }
      } catch (e) {
        console.error("Apps Script error:", e);
        return { success: false, error: e.message };
      }
    }

    async function registerUser() {
      hideMsg(authErrorMsg);
      hideMsg(authSuccessMsg);

      const username = authLogin.value.trim();
      const password = authPassword.value.trim();

      if (!username || !password) return showError(authErrorMsg, "Введите логин и пароль.");

      const res = await callAppsScript("registerUser", { username, password });
      if (res && res.success) showSuccess(authSuccessMsg, "Регистрация успешна. Теперь нажмите «Войти».");
      else showError(authErrorMsg, (res && res.error) ? res.error : "Ошибка регистрации.");
    }

    async function loginUser() {
      hideMsg(authErrorMsg);
      hideMsg(authSuccessMsg);

      const username = authLogin.value.trim();
      const password = authPassword.value.trim();

      if (!username || !password) return showError(authErrorMsg, "Введите логин и пароль.");

      const res = await callAppsScript("loginUser", { username, password });
      if (res && res.success) {
        currentUser = res.username || username;
        authScreen.style.display = "none";
        startScreen.style.display = "block";
      } else {
        showError(authErrorMsg, (res && res.error) ? res.error : "Неверный логин или пароль.");
      }
    }

    function formatFeedbackMsg(isCorrect, explanation) {
      let msg = isCorrect ? "✅ Верно!" : "❌ Неверно.";
      if (explanation && explanation.trim()) msg += "<br>Примечание: " + escapeHtml(explanation);
      return msg;
    }

    function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }
    function clearAuto() { if (autoTransitionTimeout) clearTimeout(autoTransitionTimeout); autoTransitionTimeout = null; }

    function updateTimerUI() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      timerDisplay.textContent = `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      timerDisplay.classList.toggle("warning", timeLeft <= 10);
    }

    function startTimerForQuestion() {
      stopTimer();
      timeLeft = 60;
      updateTimerUI();
      timerInterval = setInterval(() => {
        if (answerLock) return;
        if (timeLeft <= 1) {
          timeLeft = 0;
          updateTimerUI();
          stopTimer();
          handleTimeout();
          return;
        }
        timeLeft -= 1;
        updateTimerUI();
      }, 1000);
    }

    function recordAnswer(isCorrect, userRaw, correctDisplay) {
      const q = currentQuestionObj;
      userAnswersRecord.push({
        questionId: q.id,
        questionText: q.questionText,
        userAnswer: userRaw,
        isCorrect,
        correctAnswer: correctDisplay,
        explanation: q.explanation || ""
      });

      feedbackBlock.innerHTML = formatFeedbackMsg(isCorrect, q.explanation);
      feedbackBlock.className = isCorrect ? "feedback correct" : "feedback wrong";
      feedbackBlock.style.display = "block";

      submitBtn.style.display = "none";
      nextBtn.style.display = "block";
      nextBtn.textContent = (currentQuestionIndex + 1 === currentQuizQuestions.length) ? "Завершить квиз" : "➡ Перейти к следующему";
    }

    function handleTimeout() {
      if (answerLock) return;
      answerLock = true;
      stopTimer();

      const q = currentQuestionObj;
      let correctTxt = "";
      if (q.type === "single") correctTxt = q.options[q.correctAnswers];
      else if (q.type === "multiple") correctTxt = q.correctAnswers.map(i => q.options[i]).join(", ");
      else correctTxt = q.correctAnswers;

      let html = `⏰ Время вышло! Правильный ответ: ${escapeHtml(correctTxt)}.`;
      if (q.explanation) html += `<br>Примечание: ${escapeHtml(q.explanation)}`;

      feedbackBlock.innerHTML = html;
      feedbackBlock.className = "feedback wrong";
      feedbackBlock.style.display = "block";

      userAnswersRecord.push({
        questionId: q.id,
        questionText: q.questionText,
        userAnswer: "timeout",
        isCorrect: false,
        correctAnswer: correctTxt,
        explanation: q.explanation || ""
      });

      submitBtn.style.display = "none";
      nextBtn.style.display = "block";
      nextBtn.textContent = (currentQuestionIndex + 1 === currentQuizQuestions.length) ? "Завершить квиз" : "➡ Перейти к следующему";

      clearAuto();
      autoTransitionTimeout = setTimeout(goToNext, 60000);
    }

    function checkAnswer() {
      if (answerLock) return;

      const q = currentQuestionObj;
      let isCorrect = false, userRaw = "", correctDisplay = "";

      if (q.type === "single") {
        const selected = document.querySelector('input[name="singleOption"]:checked');
        if (!selected) return alert("Выберите вариант ответа.");
        const idx = Number(selected.value);
        userRaw = q.options[idx];
        correctDisplay = q.options[q.correctAnswers];
        isCorrect = idx === q.correctAnswers;
      } else if (q.type === "multiple") {
        const selectedEls = Array.from(document.querySelectorAll('input[name="multiOption"]:checked'));
        if (!selectedEls.length) return alert("Выберите минимум один вариант.");
        const selected = selectedEls.map(el => Number(el.value)).sort((a, b) => a - b);
        const correct = [...q.correctAnswers].sort((a, b) => a - b);
        isCorrect = selected.length === correct.length && selected.every((v, i) => v === correct[i]);
        userRaw = selected.map(i => q.options[i]).join("; ");
        correctDisplay = q.correctAnswers.map(i => q.options[i]).join("; ");
      } else {
        const input = document.getElementById("openInput");
        const userNorm = normalizeAnswer(input.value);
        const correctNorm = normalizeAnswer(q.correctAnswers);
        if (!userNorm) return alert("Введите ответ.");
        isCorrect = userNorm === correctNorm;
        userRaw = input.value.trim();
        correctDisplay = q.correctAnswers;
      }

      answerLock = true;
      stopTimer();
      clearAuto();
      recordAnswer(isCorrect, userRaw, correctDisplay);
    }

    function goToNext() {
      clearAuto();
      if (currentQuestionIndex + 1 < currentQuizQuestions.length) {
        currentQuestionIndex++;
        renderCurrentQuestion();
      } else {
        finishQuiz();
      }
    }

    async function saveResultAuto(finalData) {
      if (savingInProgress) return;
      savingInProgress = true;
      hideMsg(resultSaveError);

      const saveRes = await callAppsScript("registerResult", finalData);
      if (!saveRes || saveRes.success === false) {
        showError(resultSaveError, "Не удалось сохранить результат. Попробуйте позже.");
      }

      savingInProgress = false;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function shuffleQuestionOptions(question) {
      const q = JSON.parse(JSON.stringify(question));

      if (q.type === "open" || !Array.isArray(q.options) || q.options.length <= 1) return q;

      const indexed = q.options.map((opt, idx) => ({ opt, oldIdx: idx }));
      shuffleArray(indexed);
      q.options = indexed.map(item => item.opt);

      if (q.type === "single") {
        q.correctAnswers = indexed.findIndex(item => item.oldIdx === q.correctAnswers);
      } else if (q.type === "multiple") {
        q.correctAnswers = q.correctAnswers
          .map(oldIdx => indexed.findIndex(item => item.oldIdx === oldIdx))
          .sort((a, b) => a - b);
      }

      return q;
    }

    function buildQuiz(theme, difficulty, count) {
      const filtered = questionsBank.filter(q => (theme === "mix" || q.topic === theme) && q.difficulty === difficulty);
      if (filtered.length < count) {
        return { success: false, msg: `Не хватает вопросов: доступно ${filtered.length}, запрошено ${count}.` };
      }
      const selected = shuffleArray([...filtered]).slice(0, count);
      const withShuffledOptions = selected.map(shuffleQuestionOptions);
      return { success: true, questions: shuffleArray(withShuffledOptions) };
    }

    function finishQuiz() {
      stopTimer();
      clearAuto();

      const totalSeconds = Math.max(0, Math.floor((Date.now() - quizStartTimestamp) / 1000));
      const totalQ = currentQuizQuestions.length;
      const correctTotal = userAnswersRecord.filter(a => a.isCorrect).length;
      const percent = totalQ > 0 ? Math.round((correctTotal / totalQ) * 100) : 0;

      correctCountSpan.textContent = String(correctTotal);
      totalQuestionsStatSpan.textContent = String(totalQ);
      percentageStatSpan.textContent = `${percent}%`;
      totalTimeSecSpan.textContent = String(totalSeconds);
      resultUserName.textContent = currentUser || "Гость";

      quizScreen.style.display = "none";
      resultsScreen.style.display = "block";
      historyScreen.style.display = "none";

      const finalData = {
        date: new Date().toISOString(),
        username: currentUser || "Гость",
        settings: {
          theme: document.querySelector('input[name="theme"]:checked').value,
          difficulty: document.querySelector('input[name="difficulty"]:checked').value,
          questionsCount: totalQ
        },
        totalCorrect: correctTotal,
        totalQuestions: totalQ,
        percent,
        totalTimeSec: totalSeconds,
        answers: userAnswersRecord
      };

      saveResultAuto(finalData);
    }

    function renderCurrentQuestion() {
      answerLock = false;
      submitBtn.style.display = "block";
      nextBtn.style.display = "none";
      feedbackBlock.style.display = "none";
      feedbackBlock.innerHTML = "";

      stopTimer();
      clearAuto();

      currentQuestionObj = currentQuizQuestions[currentQuestionIndex];
      questionTextDiv.textContent = currentQuestionObj.questionText;
      questionCounterSpan.textContent = `Вопрос ${currentQuestionIndex + 1} / ${currentQuizQuestions.length}`;
      optionsContainer.innerHTML = "";

      if (currentQuestionObj.type === "single") {
        currentQuestionObj.options.forEach((opt, idx) => {
          const div = document.createElement("div");
          div.className = "option-item";
          div.innerHTML = `<input type="radio" name="singleOption" value="${idx}" id="opt_${idx}"> <label for="opt_${idx}">${escapeHtml(opt)}</label>`;
          optionsContainer.appendChild(div);
        });
      } else if (currentQuestionObj.type === "multiple") {
        currentQuestionObj.options.forEach((opt, idx) => {
          const div = document.createElement("div");
          div.className = "option-item";
          div.innerHTML = `<input type="checkbox" name="multiOption" value="${idx}" id="ch_${idx}"> <label for="ch_${idx}">${escapeHtml(opt)}</label>`;
          optionsContainer.appendChild(div);
        });
      } else {
        const input = document.createElement("input");
        input.type = "text";
        input.id = "openInput";
        input.placeholder = "Введите ответ...";
        input.autocomplete = "off";
        input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !answerLock) checkAnswer(); });
        optionsContainer.appendChild(input);
        setTimeout(() => input.focus(), 0);
      }

      startTimerForQuestion();
    }

    function startQuiz() {
      if (!currentUser) return showError(startErrorMsg, "Сначала выполните вход.");

      const theme = document.querySelector('input[name="theme"]:checked').value;
      const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
      const count = Number(document.getElementById("questionCountSelect").value);

      const build = buildQuiz(theme, difficulty, count);
      if (!build.success) return showError(startErrorMsg, build.msg);

      hideMsg(startErrorMsg);
      currentQuizQuestions = build.questions;
      userAnswersRecord = [];
      currentQuestionIndex = 0;
      answerLock = false;
      quizStartTimestamp = Date.now();

      startScreen.style.display = "none";
      quizScreen.style.display = "block";
      resultsScreen.style.display = "none";
      historyScreen.style.display = "none";

      renderCurrentQuestion();
    }

    function restart() {
      stopTimer();
      clearAuto();
      answerLock = false;

      startScreen.style.display = "block";
      quizScreen.style.display = "none";
      resultsScreen.style.display = "none";
      historyScreen.style.display = "none";

      hideMsg(startErrorMsg);
      hideMsg(resultSaveError);
    }

    function renderHistory(items) {
      if (!items.length) {
        historyList.innerHTML = `<div class="history-card">У вас пока нет сохранённых результатов.</div>`;
        return;
      }

      historyList.innerHTML = items.map(item => `
        <div class="history-card">
          <div><strong>${escapeHtml(formatHistoryDate(item.date))}</strong></div>
          <div>Тема: ${escapeHtml(String(item.theme))}</div>
          <div>Уровень: ${escapeHtml(String(item.difficulty))}</div>
          <div>Результат: <strong>${item.correctCount}/${item.questionsCount}</strong> (${item.percent}%)</div>
          <div>Время: ${item.timeSec} сек</div>
        </div>
      `).join("");
    }

    async function openHistory() {
      if (!currentUser) return;

      const res = await callAppsScript("getUserHistory", { username: currentUser });
      if (res && res.success) {
        renderHistory(res.history || []);
        authScreen.style.display = "none";
        startScreen.style.display = "none";
        quizScreen.style.display = "none";
        resultsScreen.style.display = "none";
        historyScreen.style.display = "block";
      } else {
        alert((res && res.error) ? res.error : "Не удалось загрузить историю.");
      }
    }

    function init() {
      authScreen = document.getElementById("authScreen");
      startScreen = document.getElementById("startScreen");
      quizScreen = document.getElementById("quizScreen");
      resultsScreen = document.getElementById("resultsScreen");
      historyScreen = document.getElementById("historyScreen");

      authLogin = document.getElementById("authLogin");
      authPassword = document.getElementById("authPassword");
      loginBtn = document.getElementById("loginBtn");
      registerBtn = document.getElementById("registerBtn");
      authErrorMsg = document.getElementById("authErrorMsg");
      authSuccessMsg = document.getElementById("authSuccessMsg");

      startErrorMsg = document.getElementById("startErrorMsg");
      startBtn = document.getElementById("startQuizBtn");
      submitBtn = document.getElementById("submitAnswerBtn");
      nextBtn = document.getElementById("nextQuestionBtn");
      restartBtn = document.getElementById("restartQuizBtn");
      historyBtn = document.getElementById("historyBtn");
      historyStartBtn = document.getElementById("historyStartBtn");
      backToResultsBtn = document.getElementById("backToResultsBtn");

      questionCounterSpan = document.getElementById("questionCounter");
      timerDisplay = document.getElementById("timerDisplay");
      questionTextDiv = document.getElementById("questionText");
      optionsContainer = document.getElementById("optionsContainer");
      feedbackBlock = document.getElementById("feedbackBlock");

      correctCountSpan = document.getElementById("correctCount");
      totalQuestionsStatSpan = document.getElementById("totalQuestionsStat");
      percentageStatSpan = document.getElementById("percentageStat");
      totalTimeSecSpan = document.getElementById("totalTimeSec");
      resultUserName = document.getElementById("resultUserName");

      resultSaveError = document.getElementById("resultSaveError");
      historyList = document.getElementById("historyList");

      loginBtn.addEventListener("click", loginUser);
      registerBtn.addEventListener("click", registerUser);
      authPassword.addEventListener("keydown", (e) => { if (e.key === "Enter") loginUser(); });

      startBtn.addEventListener("click", startQuiz);
      submitBtn.addEventListener("click", checkAnswer);
      nextBtn.addEventListener("click", () => { if (answerLock) goToNext(); });
      restartBtn.addEventListener("click", restart);

      historyBtn.addEventListener("click", () => {
        historyFrom = "results";
        openHistory();
      });

      historyStartBtn.addEventListener("click", () => {
        historyFrom = "start";
        openHistory();
      });

      backToResultsBtn.addEventListener("click", () => {
        historyScreen.style.display = "none";
        if (historyFrom === "start") startScreen.style.display = "block";
        else resultsScreen.style.display = "block";
      });
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
